services:
  - type: web
    name: naze-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: naze-postgres
          property: connectionString

  - type: pserv
    name: naze-postgres
    runtime: postgres15
    plan: free
    ipAllowList: []
    initialOpenLimit: 107
    postgresMajorVersion: '15'
